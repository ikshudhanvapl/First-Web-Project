[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "S",    # flake8-bandit (security)
    "N",    # pep8-naming
]
ignore = [
    "S101",  # assert used in tests
    "B008",  # do not perform function calls in default arguments (FastAPI deps)
    "N999",  # module name — alembic env.py is lowercase by convention
]

[tool.ruff.lint.per-file-ignores]
"tests/*"   = ["S", "N"]       # relax security + naming in tests
"migrations/*" = ["N", "E501"] # Alembic generates long lines

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths    = ["tests"]
asyncio_mode = "auto"
addopts      = "--tb=short"
log_cli      = true
log_cli_level = "WARNING"

[tool.coverage.run]
source  = ["backend"]
omit    = ["backend/migrations/*", "tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under   = 70
