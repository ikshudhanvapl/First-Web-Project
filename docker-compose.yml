version: '3.9'

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

networks:
  nexus_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true

services:

  gateway:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks: [nexus_net]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    networks: [nexus_net]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: production
    environment:
      - DATABASE_URL=postgresql://nexus_user:REPLACED_AT_RUNTIME@db:5432/nexus_iam
      - OPA_URL=http://opa:8181/v1/data/nexus/authz/allow
      - KEY_DIR=/app/keys
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
    secrets:
      - db_password
    volumes:
      # Named volume for RSA keys — persists across container restarts
      - nexus_keys:/app/keys
    depends_on:
      db:
        condition: service_healthy
      opa:
        condition: service_healthy
    networks: [nexus_net, db_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: nexus_iam
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init.sql kept for reference only — Alembic manages the schema now
    networks: [db_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_iam"]
      interval: 10s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:0.63.0-rootless
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=error"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    networks: [nexus_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  nexus_keys:
    driver: local        # RSA keypair persists across backend restarts
