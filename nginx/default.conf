server {
    listen 80;
    server_name _;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                  always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin"         always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:;"
        always;

    # ── Block common attack patterns ────────────────────────────────────────
    if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # ── Frontend (static files) ─────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache static assets aggressively
        proxy_cache_bypass $http_pragma;
    }

    # ── Auth endpoints (strict rate limiting) ──────────────────────────────
    location /api/auth/ {
        limit_req  zone=login_zone burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend_pool/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── General API ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api_zone burst=10 nodelay;
        limit_req_status 429;

        # Strip /api prefix before forwarding
        rewrite    ^/api/(.*) /$1 break;
        proxy_pass         http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    # ── Block direct OPA / DB access ───────────────────────────────────────
    location ~ ^/(opa|postgres|db)/ {
        return 404;
    }
}
